name: Rust CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  run-validator:
    name: "Hardware Validation (Fuzzer)"
    runs-on: ubuntu-latest

    steps:
    - name: Checkout project
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y verilator g++ coq yosys z3 python3 git make cargo
        git clone --depth=1 https://github.com/YosysHQ/sby.git /tmp/sby
        sudo make -C /tmp/sby install

    - name: Install Rust Toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: tools/lx32_validator

    - name: Execute Automated Setup
      run: make setup
